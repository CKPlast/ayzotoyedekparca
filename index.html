<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYZ OTO YEDEK PARÇA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .logo-placeholder {
            width: 80px;
            height: 80px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: #555;
            font-weight: bold;
        }
        h1 {
            color: #1a1a1a;
            font-size: 22px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 14px;
            margin: 12px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,123,255,0.15);
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #28a745;
            box-shadow: 0 4px 6px rgba(40,167,69,0.15);
        }
        .btn-secondary:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- İstersen buraya logonun internet linkini de koyabilirsin -->
    <div class="logo-placeholder">AYZ</div>
    
    <h1>AYZ OTO YEDEK PARÇA</h1>
    <p>Bizimle iletişime geçmek için lütfen bir hat seçiniz:</p>
    
    <!-- 1. TİMUR BUDAK (Numarayı değiştir) -->
    <a href="tel:+905322161207" class="btn">TİMUR BUDAK Ara</a>
    
    <!-- 2. ERDOĞAN DAVRANMAZ  (Numarayı değiştir) -->
    <a href="tel:+905337670636" class="btn btn-secondary">ERDOĞAN DAVRANMAZ Ara</a>
</div>

</body>
</html>
